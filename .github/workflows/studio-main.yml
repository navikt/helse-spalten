name: Bygg og deploy studio
on:
  push:
    paths-ignore:
      - '.idea/**'
    branches:
      - main
  schedule:
    - cron: '0 4 * * 3'
      timezone: 'Europe/Oslo'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6

      - name: Installer pnpm
        uses: pnpm/action-setup@v6.0.5

      - name: Konfigurer Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Installer avhengigheter
        run: pnpm install --frozen-lockfile

      - name: Valider TypeScript
        run: pnpm tsc

      - name: Bygg app
        run: pnpm build

      - name: Deploy sanity
        if: ${{ github.ref_name == 'main' }}
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_TOKEN }}
          SANITY_STUDIO_DATASET: production
        run: pnpm sanity deploy
